
run:
  name: rnaseL_1WDY_commercial_fast5k
  work_dir: runs/rnaseL_1WDY_commercial_fast5k
  project_dir: /data/project/hanwen/software/docking-pipeline
  random_seed: 1234567

inputs:
  receptor_pdb: /data/project/hanwen/wqr/RNaseL/1WDY_prep.pdb
  ligands_sdf: /data/project/hanwen/commercial/*.sdf
  docking_box:
    center: [17.507499, -1.248500, 14.571499]
    size: [35.67, 20.11, 23.53]

selection:
  after_fast_top_fraction: 0.20
  after_balance_top_fraction: 0.15
  cluster_count: 10
  cluster_representatives_per_cluster: 10000

unidock2:
  env_name: unidock2
  gpu_device_id: 0
  num_pose: 10
  rmsd_limit: 1.0
  energy_range: 5.0
  temp_dir: /tmp
  stages:
    fast: {search_mode: fast, chunk_size: 5000}
    balance: {search_mode: balance, chunk_size: 30000}
    detail: {search_mode: detail, chunk_size: 8000}

clustering:
  env_name: dock-pipe
  fingerprint: {type: ecfp, radius: 3, n_bits: 2048}
  method: kmeans

unimol:
  env_name: unimol-v2
  repo_dir: /data/project/hanwen/software/docking-pipeline/third_party/Uni-Mol/unimol_docking_v2
  model_path: /data/project/hanwen/software/docking-pipeline/models/unimol_docking_v2_240517.pt
  mode: batch_one2many
  batch_size: 16
  conf_size: 10
  cluster_conformers: true
  use_current_ligand_conf: false
  steric_clash_fix: true
  chunk_size: 512

gnina:
  executable: gnina
  mode: score_only
  chunk_size: 500

slurm:
  account: null
  cpu_partition: bigmem
  bigmem_partition: bigmem
  gpu_partition_unidock2: gpu_4090
  gpu_partition_unimol: gpu_h100
  gpu_partition_gnina: gpu_4090
  gpu_qos_unidock2: normal_gpu_4090
  gpu_qos_gnina: normal_gpu_4090
  defaults:
    cpus_per_task: 8
    mem: 64G
