run:
  name: test_0_9999
  work_dir: runs/test_0_9999
  project_dir: /data/project/hanwen/software/docking-pipeline
  random_seed: 1234567

inputs:
  receptor_pdb: ../test/receptor.pdb
  ligands_sdf: ../test/data_0_9999.sdf
  docking_box:
    center: [50.98, 53.90, 39.85]
    size: [14.13, 14.83, 14.21]

selection:
  after_fast_top_fraction: 0.20
  after_balance_top_fraction: 0.15
  cluster_count: 10
  cluster_representatives_per_cluster: 300

unidock2:
  env_name: unidock2
  gpu_device_id: 0
  num_pose: 10
  rmsd_limit: 1.0
  energy_range: 5.0
  temp_dir: /data/project/hanwen/software/docking-pipeline/tmp
  stages:
    fast:
      search_mode: fast
      chunk_size: 5000
    balance:
      search_mode: balance
      chunk_size: 3000
    detail:
      search_mode: detail
      chunk_size: 1000

clustering:
  env_name: dock-pipe
  fingerprint:
    type: ecfp
    radius: 3
    n_bits: 2048
  method: kmeans

unimol:
  env_name: unimol-v2
  repo_dir: /data/project/hanwen/software/docking-pipeline/third_party/Uni-Mol/unimol_docking_v2
  model_path: /data/project/hanwen/software/docking-pipeline/models/unimol_docking_v2_240517.pt
  mode: batch_one2many
  batch_size: 8
  conf_size: 10
  cluster_conformers: true
  use_current_ligand_conf: false
  steric_clash_fix: true
  chunk_size: 128

gnina:
  executable: gnina
  mode: minimize
  chunk_size: 500
  cnn: default

slurm:
  account: null
  cpu_partition: normal
  bigmem_partition: bigmem
  gpu_partition_unidock2: gpu_4090
  gpu_partition_unimol: gpu_h100
  gpu_partition_gnina: gpu_4090
  defaults:
    time: "96:00:00"
    cpus_per_task: 16
    mem: 64G
